name: KICS Security Scan

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  kics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare output directory
        shell: bash
        run: mkdir -p kics-results

      - name: Run KICS (non-blocking)
        uses: checkmarx/kics-github-action@v2.1.20
        with:
          path: "modules,live"
          platform_type: terraform
          output_path: kics-results
          output_formats: "json,sarif"
          ignore_on_exit: results

      - name: Upload KICS SARIF
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: kics-results/results.sarif
          wait-for-processing: false

      - name: Upload KICS SARIF artifact (fallback when code scanning disabled)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kics-sarif
          path: kics-results/results.sarif
