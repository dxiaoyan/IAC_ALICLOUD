format_version: IaCService/2021-08-06
description: Lilly prd core deployment

deployment:
  - name: prd-core
    inputs:
      region: "cn-shanghai"

      global:
        project: "lilly"
        environment: "prd"
        region: "cn-shanghai"
        timezone: "Asia/Shanghai"
